name: Build Mac

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run build:mac || true
      - uses: actions/upload-artifact@v4
        with:
          name: Grasskit-mac
          path: |
            dist/*.dmg
            dist/*.zip
